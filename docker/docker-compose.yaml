# mEMP Docker Compose — Entwicklungs- und Staging-Setup
# Produktion: eigene Overrides via docker-compose.prod.yaml

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: memp-api:${TAG:-latest}
    environment:
      NODE_ENV: production
      APP_ENV: ${APP_ENV:-prod}
      API_PORT: "3000"
      DATABASE_URL: postgres://memp:${POSTGRES_PASSWORD}@postgres:5432/memp
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks: [memp-net]

  web:
    image: nginx:alpine
    volumes:
      - ../apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:8080"
    depends_on: [api]
    restart: unless-stopped
    networks: [memp-net]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: memp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: memp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memp -d memp"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks: [memp-net]

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks: [memp-net]

networks:
  memp-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
