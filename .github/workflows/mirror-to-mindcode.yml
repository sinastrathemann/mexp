name: Mirror to mindcode

on:
  push:
    branches: ["**"]
    tags: ["**"]
  workflow_dispatch:

concurrency:
  group: mirror-mindcode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push refs to mindcode (safe, non-force)
        env:
          MINDCODE_USER: sina.strathemann
          MINDCODE_TOKEN: ${{ secrets.MINDCODE_TOKEN }}
        run: |
          git remote add mindcode "https://${MINDCODE_USER}:${MINDCODE_TOKEN}@mindcode.mindsquare.de/sina.strathemann/mexp.git"
          # Plain push: succeeds as fast-forward, fails visibly if mindcode has diverged.
          # No --force anywhere — divergence must be resolved manually before mirror resumes.
          git push mindcode --all
          git push mindcode --tags
